modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/Saucy-Boi420/DeceasedCC-2.0/issues"

# Phase 8.2 — Mixin config. Registered here so Forge's MixinLauncher loads it
# during early startup, before the target classes are transformed.
[[mixins]]
config="mixins.deceasedcc.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="computercraft"
    mandatory=true
    versionRange="[1.100,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="tacz"
    mandatory=true
    versionRange="[1.0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="geckolib"
    mandatory=true
    versionRange="[4.0,)"
    ordering="AFTER"
    side="BOTH"
